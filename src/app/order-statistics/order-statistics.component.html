<app-header></app-header>
<app-back></app-back>



<div class="p-6 mt-10 mb-10 max-w-6xl mx-auto">
  <div class="flex flex-col items-center mb-10">
    <h2 class="text-3xl font-extrabold text-[#6b3f1e] mb-2">
      📊 إحصائيات الطلبات
    </h2>
    <p class="text-[#9a6b41] font-medium">نظرة عامة على أداء المبيعات حسب التاريخ</p>
  </div>

  <!-- Summary Card -->
  <div class="bg-white rounded-3xl p-8 mb-8 shadow-sm border border-[#e2c9a5] flex flex-col sm:flex-row justify-around items-center text-center gap-6">
    <div>
      <p class="text-[#9a6b41] text-sm uppercase tracking-wider mb-1">إجمالي الطلبات</p>
      <p class="text-5xl font-black text-[#4e2d14]">{{ orders.length }}</p>
    </div>
    <div class="hidden sm:block w-px h-16 bg-[#e2c9a5]"></div>
    <div>
      <p class="text-[#9a6b41] text-sm uppercase tracking-wider mb-1">حالة المتجر</p>
      <p class="text-xl font-bold text-green-600">نشط الآن ✅</p>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <!-- Daily -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border-b-4 border-blue-500 hover:shadow-md transition-all group">
      <div class="flex justify-between items-start mb-4">
        <div class="p-3 bg-blue-50 rounded-xl group-hover:bg-blue-100 transition">
          <span class="text-2xl">📅</span>
        </div>
      </div>
      <p class="text-[#9a6b41] text-sm font-bold mb-1">آخر 24 ساعة</p>
      <p class="text-4xl font-extrabold text-[#4e2d14]">{{ stats.daily }}</p>
    </div>

    <!-- Weekly -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border-b-4 border-green-500 hover:shadow-md transition-all group">
      <div class="flex justify-between items-start mb-4">
        <div class="p-3 bg-green-50 rounded-xl group-hover:bg-green-100 transition">
          <span class="text-2xl">📆</span>
        </div>
      </div>
      <p class="text-[#9a6b41] text-sm font-bold mb-1">آخر 7 أيام</p>
      <p class="text-4xl font-extrabold text-[#4e2d14]">{{ stats.weekly }}</p>
    </div>

    <!-- Monthly -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border-b-4 border-orange-500 hover:shadow-md transition-all group">
      <div class="flex justify-between items-start mb-4">
        <div class="p-3 bg-orange-50 rounded-xl group-hover:bg-orange-100 transition">
          <span class="text-2xl">📉</span>
        </div>
      </div>
      <p class="text-[#9a6b41] text-sm font-bold mb-1">آخر 30 يوم</p>
      <p class="text-4xl font-extrabold text-[#4e2d14]">{{ stats.monthly }}</p>
    </div>

    <!-- Yearly -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border-b-4 border-purple-500 hover:shadow-md transition-all group">
      <div class="flex justify-between items-start mb-4">
        <div class="p-3 bg-purple-50 rounded-xl group-hover:bg-purple-100 transition">
          <span class="text-2xl">🏆</span>
        </div>
      </div>
      <p class="text-[#9a6b41] text-sm font-bold mb-1">آخر سنة</p>
      <p class="text-4xl font-extrabold text-[#4e2d14]">{{ stats.yearly }}</p>
    </div>
  </div>
</div>





<app-footer></app-footer>
