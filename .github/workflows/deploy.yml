name: Deploy Chocobar to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Modern permissions for direct deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 📦
        run: npm ci

      - name: Build 🏗️
        run: npm run build -- --base-href /Chocobar/

      - name: Fix SPA Routing (404.html) 🔄
        run: cp dist/ag/browser/index.html dist/ag/browser/404.html

      - name: Upload Artifact 📤
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/ag/browser'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
